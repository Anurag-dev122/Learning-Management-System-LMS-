<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy LMS - Premium Learning Platform</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="A comprehensive Learning Management System built for state-of-the-art virtual education, including quiz assessment, assignments, peer reviews, grading dashboards, and certification.">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/course.css">
</head>
<body>

  <!-- AUTHENTICATION VIEW (Initially visible if not logged in) -->
  <div id="auth-container" style="display: flex; align-items: center; justify-content: center; width: 100vw; min-height: 100vh; background-color: var(--bg-app);">
    <div class="glass-card" id="auth-form-box" style="width: 100%; max-width: 440px; margin: 20px; animation: fadeIn 0.4s ease forwards;">
      <!-- Auth form dynamically injected by app.js -->
    </div>
  </div>

  <!-- APPLICATION WORKSPACE CONTAINER -->
  <div id="app-container" style="display: none;">
    <!-- SIDEBAR NAVIGATION -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="user-avatar" style="background: linear-gradient(135deg, var(--accent), #f43f5e);">🎓</div>
        <div class="sidebar-logo">ACADEMY LMS</div>
      </div>
      
      <!-- NAVIGATION LINKS -->
      <ul class="nav-links" id="sidebar-nav-links">
        <!-- Rendered dynamically by app.js -->
      </ul>

      <!-- USER PROFILE MINI DRAWER -->
      <div class="sidebar-footer">
        <div class="user-profile-summary">
          <div class="user-avatar" id="sidebar-avatar-char">U</div>
          <div class="user-info">
            <span class="user-name" id="user-profile-name">User Name</span>
            <span class="user-role" id="user-profile-role">student</span>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" id="btn-logout" style="width: 100%;">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN APP WRAPPER -->
    <main id="main-content">
      <!-- TOP TOOLBAR -->
      <header class="top-header">
        <div>
          <!-- Placeholder or course contextual navigation -->
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle dark/light mode">🌓</button>
        </div>
      </header>

      <!-- VIEWPORT PANELS CONTAINER -->
      <div id="view-container" style="flex-grow: 1; overflow-y: auto;">
        <!-- Injected dynamically by SPA routers -->
      </div>
    </main>
  </div>

  <!-- GLOBAL MODALS LAYER -->
  <div class="modal-overlay" id="global-modal-overlay">
    <!-- Injected dynamically by modals launcher -->
  </div>

  <!-- JS CONTROLLERS -->
  <script src="/js/quiz.js"></script>
  <script src="/js/certificate.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
